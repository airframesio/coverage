services:
  coverage-service:
    build: ./service
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      NATS_URL: "nats://host.docker.internal:4222"
      MAIN_API_URL: "http://host.docker.internal:3001"
      DEV_AUTO_TRUST_STATIONS: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  coverage-map:
    build:
      context: ./map
      args:
        NEXT_PUBLIC_COVERAGE_API_URL: "http://localhost:3002"
        NEXT_PUBLIC_WS_URL: "ws://localhost:3002/ws"
    ports:
      - "3003:3000"
    depends_on:
      - coverage-service
    restart: unless-stopped
