name: Map CI

on:
  push:
    branches: [main]
    paths: [map/**]
  pull_request:
    branches: [main]
    paths: [map/**]

defaults:
  run:
    working-directory: map

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: map/package-lock.json
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    env:
      NEXT_PUBLIC_COVERAGE_API_URL: https://coverage-api.airframes.io
      NEXT_PUBLIC_WS_URL: wss://coverage-api.airframes.io/ws
      NEXT_PUBLIC_MAP_STYLE_URL: https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: map/package-lock.json
      - run: npm ci
      - run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: map
          push: false
          build-args: |
            NEXT_PUBLIC_COVERAGE_API_URL=https://coverage-api.airframes.io
            NEXT_PUBLIC_WS_URL=wss://coverage-api.airframes.io/ws
          cache-from: type=gha,scope=map
          cache-to: type=gha,scope=map,mode=max

  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: map
          push: true
          tags: ghcr.io/airframesio/coverage-map:latest
          build-args: |
            NEXT_PUBLIC_COVERAGE_API_URL=https://coverage-api.airframes.io
            NEXT_PUBLIC_WS_URL=wss://coverage-api.airframes.io/ws
          cache-from: type=gha,scope=map
          cache-to: type=gha,scope=map,mode=max
